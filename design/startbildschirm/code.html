<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "secondary-fixed": "#d4e4f6",

                    "outline-variant": "#c4c6cd",
                    "on-tertiary": "#ffffff",

                    "on-tertiary-container": "#00a47f",
                    "on-error": "#ffffff",

                    "xl": "0.75rem",

            "spacing": {
                    "margin-mobile": "16px",
                    "stack-md": "24px",
                    "unit": "8px",
                    "stack-sm": "12px",
                    "stack-lg": "48px",
                    "gutter": "24px",
                    "container-max": "1200px"

            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "label-caps": ["Inter"],
                    "display-lg": ["Inter"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(249, 249, 249, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .pebble-shape {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 40%;
        }
    </style>
</head>
<body class="bg-cloud-white font-body-md text-midnight-fjord antialiased">
<!-- Splash Screen Container -->
<main class="min-h-screen flex flex-col items-center justify-between px-6 py-12 md:py-24 max-w-[1200px] mx-auto overflow-hidden relative">
<!-- Background Ambient Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-glacier-mint/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary-fixed/30 rounded-full blur-[100px]"></div>
<!-- Top Section: Brand Identity -->
<header class="w-full flex flex-col items-center z-10">
<div class="mb-4">
<span class="text-label-caps font-label-caps text-slate-stone uppercase tracking-[0.2em]">Premium Hospitality</span>
</div>
<h1 class="text-display-lg font-display-lg text-midnight-fjord tracking-tighter uppercase">STIVARD</h1>
</header>
<!-- Central Mascot Section -->
<div class="flex-1 flex flex-col items-center justify-center w-full z-10 space-y-8">
<div class="relative group">
<!-- Floating Decorative Pebbles (Brand Anchor) -->
<div class="absolute -top-4 -left-8 w-12 h-10 bg-glacier-mint/40 pebble-shape blur-sm animate-pulse"></div>
<div class="absolute bottom-12 -right-6 w-8 h-8 bg-midnight-fjord/5 pebble-shape blur-[2px]"></div>
<div class="w-64 h-64 md:w-80 md:h-80 relative overflow-hidden pebble-shape shadow-2xl shadow-midnight-fjord/10 bg-white">
<img alt="Stewart the digital concierge" class="w-full h-full object-cover transform scale-110 group-hover:scale-105 transition-transform duration-700 ease-out" data-alt="A professional and friendly digital concierge mascot named Stewart, characterized by a sophisticated, high-tech aesthetic. The character is set against a clean, minimalist studio background with soft Nordic lighting that highlights subtle glassmorphic textures. The color palette is dominated by crisp whites and soft silvers with accents of glacier mint. The mood is helpful, intelligent, and premium." src="https://lh3.googleusercontent.com/aida/ADBb0ujTfLt_Oxu2-zg2k2K2_sCLuMp1mymHIHEal9KjoeqM6w_C43uW-C0SZEG1d_YJH3YgBIRt_dFeggzjtZKQoDC0DnNkfCjEGqv0aQynHlBM2gIKuDPo8MeZg4t638nrIf5IYkjMJ-UP0J8Ntk-RXu3sPT8HPx67gZOgPXQvaEa5f85h6L64tutpEi8_6FksMFlwoaLgQJdQmahk8LPc39P0svJa4wFad2boK4eYUjpYBJ0hmvS71s007-ffiJlCl7mziXN2EuFmQH8"/>
</div>
<!-- Soft Glow behind Mascot -->
<div class="absolute inset-0 bg-glacier-mint/20 blur-3xl -z-10 rounded-full"></div>
</div>
<div class="text-center space-y-4 max-w-sm">
<h2 class="text-headline-md font-headline-md text-midnight-fjord">Welcome to STIVARD</h2>
<p class="text-body-lg font-body-lg text-slate-stone">Your personal digital concierge, redefining the art of high-end service.</p>
</div>
</div>
<!-- Bottom Section: CTA and Navigation Guidance -->
<footer class="w-full flex flex-col items-center z-10 space-y-8">
<!-- Progress Indicator (The Varde) -->
<div class="flex space-x-3 items-center">
<div class="w-4 h-3 bg-glacier-mint pebble-shape shadow-sm shadow-glacier-mint/50"></div>
<div class="w-3 h-2 bg-surface-variant pebble-shape"></div>
<div class="w-3 h-2 bg-surface-variant pebble-shape"></div>
</div>
<div class="w-full max-w-xs">
<button class="w-full py-5 bg-glacier-mint hover:bg-glacier-mint/90 text-midnight-fjord font-headline-sm rounded-full shadow-lg shadow-mint-glow transition-all duration-300 transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3">
                    Get Started
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Nordic Minimalist Detail -->
<div class="flex items-center space-x-6 text-slate-stone/60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="lock">lock</span>
<span class="text-label-caps font-label-caps">Secure</span>
</div>
<div class="w-1 h-1 bg-slate-stone/30 rounded-full"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="verified_user">verified_user</span>
<span class="text-label-caps font-label-caps">Verified</span>
</div>
</div>
</footer>
<!-- Hidden Canvas Elements for Layout Integrity (As requested in prompts) -->
<div class="hidden">

</div>
</main>
